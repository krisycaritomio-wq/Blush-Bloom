<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de profucto</title>
    <link rel="stylesheet" href="hola.css">
</head>
<body>

    <main class="producto">
        <section class="galeria">

            <img src="imagen2.png" alt="Producto" class="img-principal">

            <div class="miniaturas">

                <img src="imagen3.png" alt="">
                <img src="imagen4.png" alt="">
                <img src="imagen5.png" alt="">

            </div>

        </section>

        <!-- Información -->
        <section class="info">

            <h1>Teddy Tint</h1>

            <p class="precio">$13.50</p>
             <div class="etiquetas">
                <span>Brillo</span>
                <span>Hidratación</span>
                <span>Larga duración</span>
            </div>

            <p class="descripcion">
                Tonalidad: July Forever
            </p>

            <div class="cantidad">

                <button>-</button>

                <input type="number" value="1">

                <button>+</button>

            </div>

            <button class="btn-carrito">
                Agregar al carrito
            </button>

            <button class="btn-comprar">
                Comprar ahora
            </button>

        </section>

    </main>

</body>
</html>
    
</body>
</html>
