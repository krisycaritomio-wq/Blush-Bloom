<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de producto</title>
    <link rel="stylesheet" href="hola.css">
</head>
<body>

    <main class="producto">
        <section class="galeria">

            <img src="imagen9.png" alt="Producto" class="img-principal">

            <div class="miniaturas">

                <img src="imagen8.png" alt="">
                <img src="imagen7.png" alt="">
                <img src="imagen6.png" alt="">

            </div>

        </section>

        <!-- Información -->
        <section class="info">

            <h1>Glow reviver plumping | Lip oil</h1>

            <p class="precio">$14.50</p>
             <div class="etiquetas">
                <span>Brillo</span>
                <span>Hidratación</span>
                <span>Larga duración</span>
            </div>

            <p class="descripcion">
                Tonalidad: Burts bubble - Neutral pink
            </p>

            <div class="cantidad">

                <button>-</button>

                <input type="number" value="1">

                <button>+</button>

            </div>

            <button class="btn-carrito">
                Agregar al carrito
            </button>

            <button class="btn-comprar">
                Comprar ahora
            </button>

        </section>

    </main>

</body>
</html>
    
</body>
</html>
